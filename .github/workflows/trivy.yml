name: Trivy Scan

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t kwvt:${{ github.sha }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: kwvt:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
