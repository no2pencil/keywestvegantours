name: Build and Push to AWS ECR

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3006    ## There are no "latest" tags in Dockerfile - ignoring

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker Image for Trivy
        run: docker build -t kwvt:${{ github.sha }} .
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kwvt:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  build:
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy]   
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker Image
        run: docker build -t kwvt:${{ github.sha }} -f ./Dockerfile .
      - name: Configure GitHub Credentials
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Run Docker Scout vulnerability analysis
        uses: docker/scout-action@v1
        with:
          image: kwvt:${{ github.sha }}
          command: cves
          only-fixed: true
          exit-code: true
          only-severity: critical,high
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Tag Docker Image
        run: |
          docker tag kwvt:${{ github.sha }} \
          899740821150.dkr.ecr.$AWS_REGION.amazonaws.com/kwvt:${{ github.sha }}
      - name: Push Docker Image
        run: |
          docker push 899740821150.dkr.ecr.$AWS_REGION.amazonaws.com/kwvt:${{ github.sha }}
